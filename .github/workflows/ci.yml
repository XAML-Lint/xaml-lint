name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Nerdbank.GitVersioning needs full history

      - name: Setup .NET SDK + runtimes
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Print SDK version
        run: dotnet --info

      - name: Restore
        run: dotnet restore xaml-lint.slnx

      - name: Build
        run: dotnet build xaml-lint.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --solution xaml-lint.slnx --configuration Release --no-build --verbosity normal

      - name: DocTool --check
        run: dotnet run --project src/XamlLint.DocTool --configuration Release --no-build -- --check
