name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nerdbank.GitVersioning needs full history

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Print SDK version
        run: dotnet --info

      - name: Restore
        run: dotnet restore xaml-lint.slnx

      - name: Build
        run: dotnet build xaml-lint.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --solution xaml-lint.slnx --configuration Release --no-build --verbosity normal
