name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Pack and push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET SDK + runtimes
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore xaml-lint.slnx

      - name: Build
        run: dotnet build xaml-lint.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --solution xaml-lint.slnx --configuration Release --no-build --verbosity normal

      - name: DocTool --check
        run: dotnet run --project src/XamlLint.DocTool --configuration Release --no-build -- --check

      - name: Pack
        run: dotnet pack src/XamlLint.Cli --configuration Release --no-build --output ./artifacts

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push ./artifacts/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
